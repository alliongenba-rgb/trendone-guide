<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TREND-ONE 操作ガイド</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;
  --accent:#00d4ff;--accent2:#00ff88;--accent3:#ff6b35;
  --text:#e6edf3;--text-muted:#7d8590;--text-dim:#4a5568;
  --done:#00ff88;--active:#00d4ff;--todo:#333a45;--progress-bg:#21262d;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* --- LAYOUT --- */
.app{display:grid;grid-template-columns:300px 1fr;grid-template-rows:60px 1fr;height:100vh;}

/* --- HEADER --- */
header{
  grid-column:1/-1;grid-row:1;
  background:var(--surface);border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 20px;z-index:100;
}
.logo{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--accent);letter-spacing:2px;white-space:nowrap;flex-shrink:0;}
.logo span{color:var(--accent2);}
.hdr-search{flex:1;max-width:420px;position:relative;}
.hdr-search input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:7px 14px 7px 36px;color:var(--text);font-family:'Noto Sans JP',sans-serif;
  font-size:13px;outline:none;transition:border-color .2s;
}
.hdr-search input:focus{border-color:var(--accent);}
.hdr-search input::placeholder{color:var(--text-muted);}
.hdr-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;}
.prog-wrap{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-muted);white-space:nowrap;}
.prog-bar{width:100px;height:5px;background:var(--progress-bg);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease;}
.prog-pct{font-family:'Share Tech Mono',monospace;font-weight:700;color:var(--accent);font-size:13px;}

/* --- SIDEBAR --- */
.sidebar{
  grid-column:1;grid-row:2;
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sb-search{padding:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5;}
.sb-search-inner{position:relative;}
.sb-search-inner input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;
  padding:7px 10px 7px 32px;color:var(--text);font-family:'Noto Sans JP',sans-serif;
  font-size:12px;outline:none;transition:border-color .2s;
}
.sb-search-inner input:focus{border-color:var(--accent);}
.sb-search-inner input::placeholder{color:var(--text-muted);}
.sb-search-inner .ssi{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px;pointer-events:none;}
.toc-label{padding:10px 14px 4px;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
.toc-item{
  display:flex;align-items:center;gap:9px;padding:9px 14px;
  cursor:pointer;transition:background .15s;border-left:3px solid transparent;user-select:none;
}
.toc-item:hover{background:var(--surface2);}
.toc-item.active{background:rgba(0,212,255,.09);border-left-color:var(--accent);}
.toc-item.done{border-left-color:var(--done);}
.toc-item.hidden{display:none;}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sdot.done{background:var(--done);box-shadow:0 0 5px var(--done);}
.sdot.active{background:var(--active);box-shadow:0 0 7px var(--active);animation:pulse 2s infinite;}
.sdot.todo{background:var(--todo);border:1px solid #555;}
@keyframes pulse{0%,100%{box-shadow:0 0 4px var(--active);}50%{box-shadow:0 0 10px var(--active);}}
.toc-num{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);width:18px;flex-shrink:0;}
.toc-text{font-size:12px;color:var(--text-muted);line-height:1.35;flex:1;}
.toc-item.active .toc-text{color:var(--text);font-weight:700;}
.toc-item.done .toc-text{text-decoration:line-through;opacity:.6;}
.toc-item.hmatch .toc-text em{background:rgba(0,212,255,.22);color:var(--accent);font-style:normal;border-radius:2px;padding:0 2px;}
.tag{font-size:9px;padding:2px 5px;border-radius:3px;font-family:'Share Tech Mono',monospace;flex-shrink:0;}
.tag-2d{background:rgba(0,255,136,.12);color:var(--accent2);border:1px solid rgba(0,255,136,.25);}
.tag-3d{background:rgba(0,212,255,.12);color:var(--accent);border:1px solid rgba(0,212,255,.25);}
.tag-setup{background:rgba(255,107,53,.12);color:var(--accent3);border:1px solid rgba(255,107,53,.25);}
.tag-mgr{background:rgba(148,103,189,.12);color:#c39bd3;border:1px solid rgba(148,103,189,.25);}
.tag-trouble{background:rgba(255,59,59,.12);color:#ff7070;border:1px solid rgba(255,59,59,.25);}
.sb-footer{padding:12px;border-top:1px solid var(--border);margin-top:auto;}
.reset-btn{
  width:100%;padding:7px;background:transparent;border:1px solid var(--border);
  border-radius:5px;color:var(--text-dim);font-size:11px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:all .2s;
}
.reset-btn:hover{border-color:var(--accent3);color:var(--accent3);}

/* --- MAIN --- */
.main{
  grid-column:2;grid-row:2;overflow-y:auto;overflow-x:hidden;
  background:var(--bg);position:relative;
}
.main::-webkit-scrollbar{width:5px;}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ★ ページ切り替えの核心 ★ */
.page{display:none;}          /* 全ページ非表示がデフォルト */
.page.active{
  display:block;              /* activeクラスのページのみ表示 */
  padding:36px 44px;
  max-width:860px;
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* --- 検索オーバーレイ --- */
.search-ov{
  display:none;position:absolute;top:0;left:0;right:0;
  background:var(--surface);border-bottom:2px solid var(--accent);
  z-index:50;max-height:60vh;overflow-y:auto;
}
.search-ov.open{display:block;}
.sr-item{
  display:flex;align-items:flex-start;gap:12px;padding:12px 20px;
  cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;
}
.sr-item:hover{background:var(--surface2);}
.sr-num{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);flex-shrink:0;margin-top:3px;}
.sr-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.sr-exc{font-size:12px;color:var(--text-muted);line-height:1.5;}
.sr-exc em{background:rgba(0,212,255,.2);color:var(--accent);font-style:normal;border-radius:2px;padding:0 2px;}
.no-res{padding:24px;text-align:center;color:var(--text-dim);font-size:13px;}
.kchips{display:flex;gap:6px;flex-wrap:wrap;padding:10px 20px;border-top:1px solid var(--border);}
.kchip{
  font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);
  color:var(--text-muted);cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;
}
.kchip:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.06);}

/* --- コンテンツ内 --- */
.bc{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;margin-bottom:20px;}
.bc-sep{color:var(--text-dim);}
.bc-cur{color:var(--accent);}
.sec-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;}
.sec-bignum{font-family:'Share Tech Mono',monospace;font-size:52px;font-weight:700;color:var(--surface2);line-height:1;flex-shrink:0;user-select:none;}
h1.sec-title{font-size:24px;font-weight:700;color:var(--text);line-height:1.3;margin-top:4px;}
.sec-sub{font-size:13px;color:var(--text-muted);margin-top:4px;}
h2{
  font-size:14px;font-weight:700;color:var(--accent);margin:24px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--surface2);
  display:flex;align-items:center;gap:7px;
}
h2::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px;flex-shrink:0;}
p{font-size:13px;line-height:1.8;color:var(--text-muted);margin-bottom:10px;}
.sec-prog{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:12px 16px;margin-bottom:24px;display:flex;align-items:center;gap:12px;
}
.sp-label{font-size:11px;color:var(--text-muted);white-space:nowrap;}
.sp-bar{flex:1;height:5px;background:var(--progress-bg);border-radius:3px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s ease;}
.sp-pct{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);}
.mark-btn{
  padding:5px 12px;border-radius:4px;font-size:11px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;transition:all .2s;white-space:nowrap;
}
.mark-btn:hover{border-color:var(--done);color:var(--done);}
.mark-btn.marked{background:rgba(0,255,136,.1);border-color:rgba(0,255,136,.35);color:var(--done);}
.steps{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.step{
  display:flex;gap:12px;align-items:flex-start;
  background:var(--surface);border:1px solid var(--border);
  border-radius:7px;padding:10px 14px;cursor:pointer;transition:all .15s;position:relative;
}
.step:hover{border-color:var(--accent);background:var(--surface2);}
.step.step-done{border-color:rgba(0,255,136,.28);background:rgba(0,255,136,.04);}
.step.step-done .step-body{opacity:.55;}
.step-num{
  font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);
  background:rgba(0,212,255,.09);border:1px solid rgba(0,212,255,.25);border-radius:3px;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.step.step-done .step-num{background:rgba(0,255,136,.09);border-color:rgba(0,255,136,.25);color:var(--done);}
.step-body{flex:1;font-size:13px;line-height:1.65;color:var(--text);}
.step-done-mark{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--done);font-size:14px;opacity:0;transition:opacity .2s;}
.step.step-done .step-done-mark{opacity:1;}
code{font-family:'Share Tech Mono',monospace;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:11px;color:var(--accent2);}
.table-wrap{overflow-x:auto;margin-bottom:14px;border-radius:7px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--surface2);color:var(--text-muted);font-weight:700;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:11px;letter-spacing:.5px;}
td{padding:9px 12px;border-bottom:1px solid rgba(48,54,61,.5);color:var(--text-muted);line-height:1.55;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
td:first-child{color:var(--text);font-weight:500;}
.alert{border-radius:7px;padding:12px 14px;margin:14px 0;display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.65;}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.alert-warn{background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.28);color:#ffb085;}
.alert-info{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.18);color:var(--text-muted);}
.alert-tip{background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.18);color:#7fffc4;}
.flow{display:flex;align-items:center;flex-wrap:wrap;gap:0;row-gap:6px;margin:12px 0;}
.flow-item{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:6px 12px;font-size:11px;color:var(--text-muted);white-space:nowrap;cursor:pointer;transition:all .15s;}
.flow-item:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.06);}
.flow-arrow{color:var(--text-dim);padding:0 4px;font-size:13px;}
.nav-btns{display:flex;gap:10px;margin-top:36px;padding-top:20px;border-top:1px solid var(--border);}
.btn{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:5px;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;border:none;font-weight:500;}
.btn-prev{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);}
.btn-prev:hover{background:var(--surface2);color:var(--text);}
.btn-next{background:var(--accent);color:var(--bg);margin-left:auto;}
.btn-next:hover{background:#00bbee;}
.btn-fin{background:var(--done);color:var(--bg);margin-left:auto;}
.btn-fin:hover{background:#00ee77;}
/* splash */
.splash-wrap{padding:40px 44px;max-width:860px;}
.splash-tag{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
.splash-h1{font-size:40px;font-weight:900;color:var(--text);line-height:1.2;margin-bottom:10px;}
.splash-h1 span{color:var(--accent);}
.splash-sub{font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:32px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);}
.card:hover::before{transform:scaleX(1);}
.card-icon{font-size:22px;margin-bottom:8px;}
.card-num{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-bottom:3px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.card-desc{font-size:11px;color:var(--text-muted);line-height:1.5;}
.cstat{position:absolute;top:11px;right:11px;width:8px;height:8px;border-radius:50%;}
.cstat.done{background:var(--done);box-shadow:0 0 5px var(--done);}
.cstat.active{background:var(--active);box-shadow:0 0 7px var(--active);animation:pulse 2s infinite;}
.cstat.todo{background:var(--todo);border:1px solid #555;}

/* ========== スマホ縦画面対応 ========== */
@media (max-width: 768px) {

  /* グリッドを1カラムに変更 */
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px auto 1fr;
    height: 100vh;
  }

  /* ヘッダー */
  header {
    padding: 0 12px;
    gap: 8px;
  }
  .logo { font-size: 13px; letter-spacing: 1px; }
  .hdr-search { max-width: none; flex: 1; }
  .hdr-search input { font-size: 12px; padding: 6px 10px 6px 30px; }
  .prog-wrap { display: none; } /* スマホでは進捗は省略 */

  /* サイドバー：デフォルト非表示、開閉式に */
  .sidebar {
    grid-column: 1;
    grid-row: 2;
    display: none;
    position: static;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .sidebar.sp-open {
    display: flex;
    max-height: 60vh;
    overflow-y: auto;
  }

  /* メニューボタン（スマホ専用） */
  .sp-menu-btn {
    display: flex !important;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    user-select: none;
  }

  /* メイン */
  .main {
    grid-column: 1;
    grid-row: 3;
  }

  /* ページコンテンツ */
  .page.active {
    padding: 20px 16px 40px;
    max-width: 100%;
  }

  /* スプラッシュ */
  .splash-wrap { padding: 20px 16px; }
  .splash-h1 { font-size: 28px; }
  .splash-sub { font-size: 13px; }
  .card-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .card { padding: 12px; }
  .card-icon { font-size: 18px; margin-bottom: 6px; }
  .card-title { font-size: 12px; }
  .card-desc { display: none; } /* カード説明は省略 */

  /* セクションヘッダー */
  .sec-hdr { gap: 10px; }
  .sec-bignum { font-size: 36px; }
  h1.sec-title { font-size: 18px; }
  .sec-sub { font-size: 12px; }

  /* 見出し */
  h2 { font-size: 13px; margin: 18px 0 8px; }

  /* 進捗バー */
  .sec-prog {
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 12px;
  }
  .sp-label { font-size: 10px; width: 100%; }
  .sp-bar { flex: 1; }
  .mark-btn { font-size: 11px; padding: 5px 10px; }

  /* ステップ */
  .step { padding: 10px 12px; gap: 10px; }
  .step-body { font-size: 13px; line-height: 1.6; }
  .step-num { width: 22px; height: 22px; font-size: 10px; }

  /* テーブル */
  table { font-size: 12px; }
  th { padding: 7px 10px; font-size: 10px; }
  td { padding: 7px 10px; }

  /* アラート */
  .alert { font-size: 12px; padding: 10px 12px; }

  /* フロー */
  .flow-item { font-size: 11px; padding: 5px 10px; }

  /* ナビボタン */
  .nav-btns { gap: 8px; margin-top: 24px; padding-top: 16px; }
  .btn { font-size: 12px; padding: 9px 14px; }
  .btn-next, .btn-fin { margin-left: auto; }

  /* 検索オーバーレイ */
  .search-ov { position: fixed; top: 56px; left: 0; right: 0; z-index: 200; }
  .sr-item { padding: 10px 14px; }
  .sr-title { font-size: 13px; }
  .sr-exc { font-size: 11px; }
  .kchips { padding: 8px 14px; gap: 5px; }
  .kchip { font-size: 10px; padding: 3px 8px; }

  /* TOCアイテム（サイドバー内） */
  .toc-item { padding: 11px 14px; }
  .toc-text { font-size: 13px; }

  /* パンくず */
  .bc { font-size: 10px; margin-bottom: 14px; }
}

/* タブレット対応（769px〜1024px） */
@media (min-width: 769px) and (max-width: 1024px) {
  .app { grid-template-columns: 240px 1fr; }
  .page.active { padding: 28px 32px; }
  .splash-h1 { font-size: 32px; }
  .card-grid { grid-template-columns: repeat(3, 1fr); }
}

</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header>
  <div class="logo">TREND<span>-ONE</span> ガイド</div>
  <div class="sp-menu-btn" id="spMenuBtn" onclick="toggleSPMenu()" style="display:none">☰</div>
  <div class="hdr-search">
    <span class="si">🔍</span>
    <input type="text" id="headerSearch" placeholder="キーワード検索（例：ライセンス、座標、3D…）" autocomplete="off">
  </div>
  <div class="prog-wrap">
    <span id="progLabel">0/10 完了</span>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <span class="prog-pct" id="progPct">0%</span>
  </div>
</header>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sb-search">
    <div class="sb-search-inner">
      <span class="ssi">🔍</span>
      <input type="text" id="sideSearch" placeholder="目次を絞り込む..." autocomplete="off">
    </div>
  </div>
  <div class="toc-label">目次 — 操作ステップ</div>
  <div id="tocList"></div>
  <div class="sb-footer">
    <button class="reset-btn" onclick="resetProgress()">⟳ 進捗をすべてリセット</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="mainArea">

  <!-- 検索オーバーレイ -->
  <div class="search-ov" id="searchOv">

// ========== 状態管理 ==========
const SK='trendone_v3';
function loadS(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};}}
function saveS(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}
let S=loadS();
if(!S.done)  S.done={};
if(!S.steps) S.steps={};
if(!S.cur)   S.cur=0;

// ========== TOC構築 ==========
function buildTOC(){
  const list=document.getElementById('tocList');
  list.innerHTML='';
  // トップ
  const top=document.createElement('div');
  top.className='toc-item'+(S.cur===0?' active':'');
  top.innerHTML=`<div class="sdot ${S.cur===0?'active':'todo'}"></div><div class="toc-num">00</div><div class="toc-text">トップ / 全体概要</div>`;
  top.onclick=()=>goTo(0);
  list.appendChild(top);
  SECS.forEach(sec=>{
    const isDone=!!S.done[sec.id], isActive=S.cur===sec.id;
    const el=document.createElement('div');
    el.className='toc-item'+(isActive?' active':'')+(isDone?' done':'');
    el.dataset.kw=(sec.kw||[]).join(' ')+' '+sec.title+' '+sec.sub;
    el.innerHTML=`<div class="sdot ${isDone?'done':isActive?'active':'todo'}"></div><div class="toc-num">${String(sec.id).padStart(2,'0')}</div><div class="toc-text">${sec.title}</div><span class="tag tag-${sec.tag}">${sec.tagL}</span>`;
    el.onclick=()=>goTo(sec.id);
    list.appendChild(el);
  });
}

// ========== ページ生成 ==========
function buildPages(){
  const wrap=document.getElementById('pagesWrap');
  wrap.innerHTML='';
  SECS.forEach((sec,idx)=>{
    const div=document.createElement('div');
    div.className='page';
    div.id=`page-${sec.id}`;
    const stepCount=sec.steps?sec.steps.length:0;
    const doneCount=sec.steps?sec.steps.filter((_,i)=>S.steps[`${sec.id}-${i}`]).length:0;
    const pct=stepCount>0?Math.round((doneCount/stepCount)*100):(S.done[sec.id]?100:0);
    let stepsHtml='';
    if(sec.steps){
      stepsHtml=`<h2>操作手順</h2><ol class="steps">`+
        sec.steps.map((st,i)=>`<li class="step${S.steps[`${sec.id}-${i}`]?' step-done':''}" onclick="tStep(this,${sec.id},${i})"><div class="step-num">${i+1}</div><div class="step-body">${st.t}</div><span class="step-done-mark">✓</span></li>`).join('')+
        `</ol>`;
    }
    const prevId=idx>0?SECS[idx-1].id:0;
    const nextId=idx<SECS.length-1?SECS[idx+1].id:-1;
    div.innerHTML=`
      <div class="bc"><span style="cursor:pointer;color:var(--text-muted)" onclick="goTo(0)">トップ</span><span class="bc-sep">›</span><span class="bc-cur">第${sec.id}章　${sec.title}</span></div>
      <div class="sec-hdr">
        <div class="sec-bignum">${String(sec.id).padStart(2,'0')}</div>
        <div><span class="tag tag-${sec.tag}" style="margin-bottom:5px;display:inline-block">${sec.tagL}</span><h1 class="sec-title">${sec.title}</h1><p class="sec-sub">${sec.sub}</p></div>
      </div>
      <div class="sec-prog">
        <span class="sp-label">${stepCount>0?'ステップ進捗':'チャプター状態'}</span>
        <div class="sp-bar"><div class="sp-fill" style="width:${pct}%" id="spf-${sec.id}"></div></div>
        <span class="sp-pct" id="spp-${sec.id}">${pct}%</span>
        <button class="mark-btn${S.done[sec.id]?' marked':''}" onclick="tDone(${sec.id})" id="mb-${sec.id}">${S.done[sec.id]?'✓ 完了済み':'完了にする'}</button>
      </div>
      ${stepsHtml}
      ${sec.content||''}
      <div class="nav-btns">
        <button class="btn btn-prev" onclick="goTo(${prevId})">← ${prevId===0?'トップへ':'第'+prevId+'章'}</button>
        ${nextId>=0?`<button class="btn btn-next" onclick="goTo(${nextId})">第${nextId}章へ →</button>`:`<button class="btn btn-fin" onclick="goTo(0)">🎉 全章完了！トップへ</button>`}
      </div>`;
    wrap.appendChild(div);
  });
}

// ========== スプラッシュ ==========
function buildSplash(){
  const g=document.getElementById('splashCards');
  g.innerHTML='';
  SECS.forEach(sec=>{
    const isDone=!!S.done[sec.id], isActive=S.cur===sec.id&&sec.id!==0;
    const c=document.createElement('div');
    c.className='card';
    c.innerHTML=`<div class="cstat ${isDone?'done':isActive?'active':'todo'}"></div><div class="card-icon">${sec.icon}</div><div class="card-num">第${sec.id}章</div><div class="card-title">${sec.title}</div><div class="card-desc">${sec.sub}</div>`;
    c.onclick=()=>goTo(sec.id);
    g.appendChild(c);
  });
}

// ========== ページ切り替え（核心部分） ==========
function goTo(id){
  // 1. 全ページのactiveクラスを除去（完全非表示）
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  // 2. 対象ページのみactiveに（表示）
  const target=document.getElementById(`page-${id}`);
  if(target) target.classList.add('active');
  // 3. スクロールをトップへ
  const main=document.getElementById('mainArea');
  main.scrollTop=0;
  // 4. 状態保存・TOC更新
  S.cur=id;
  saveS(S);
  buildTOC();
  if(id===0) buildSplash();
  closeSearch();
}

// ========== ステップ完了 ==========
function tStep(el,secId,stepIdx){
  const key=`${secId}-${stepIdx}`;
  if(S.steps[key]){delete S.steps[key];el.classList.remove('step-done');}
  else{S.steps[key]=true;el.classList.add('step-done');}
  saveS(S);
  const sec=SECS.find(s=>s.id===secId);
  if(sec&&sec.steps){
    const total=sec.steps.length;
    const done=sec.steps.filter((_,i)=>S.steps[`${secId}-${i}`]).length;
    const pct=Math.round((done/total)*100);
    const f=document.getElementById(`spf-${secId}`);
    const p=document.getElementById(`spp-${secId}`);
    if(f) f.style.width=pct+'%';
    if(p) p.textContent=pct+'%';
  }
  updateGlobal();
}

// ========== チャプター完了 ==========
function tDone(secId){
  if(S.done[secId]) delete S.done[secId]; else S.done[secId]=true;
  saveS(S);
  const btn=document.getElementById(`mb-${secId}`);
  if(btn){btn.classList.toggle('marked',!!S.done[secId]);btn.textContent=S.done[secId]?'✓ 完了済み':'完了にする';}
  const f=document.getElementById(`spf-${secId}`);
  if(f) f.style.width=(S.done[secId]?100:0)+'%';
  buildTOC(); updateGlobal();
}

// ========== 全体進捗 ==========
function updateGlobal(){
  const total=SECS.length;
  const done=Object.keys(S.done).filter(k=>S.done[k]).length;
  const pct=Math.round((done/total)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progLabel').textContent=`${done}/${total} 完了`;
}

// ========== リセット ==========
function resetProgress(){
  if(!confirm('進捗をすべてリセットしますか？')) return;
  localStorage.removeItem(SK);
  location.reload();
}

// ========== 検索 ==========
function doSearch(q){document.getElementById('headerSearch').value=q;runSearch(q);}
function runSearch(q){
  const ov=document.getElementById('searchOv');
  const res=document.getElementById('searchRes');
  const chips=document.getElementById('kchips');
  if(!q||q.length<1){closeSearch();return;}
  ov.classList.add('open');
  chips.style.display='none';
  const ql=q.toLowerCase();
  const hits=[];
  SECS.forEach(sec=>{
    let score=0,excerpt='';
    if(sec.title.toLowerCase().includes(ql)) score+=10;
    if(sec.sub.toLowerCase().includes(ql)) score+=5;
    (sec.kw||[]).forEach(kw=>{if(kw.toLowerCase().includes(ql)) score+=3;});
    const body=((sec.content||'').replace(/<[^>]+>/g,' ')+(sec.steps||[]).map(s=>s.t).join(' ')).toLowerCase();
    if(body.includes(ql)){
      score+=2;
      const full=(sec.content||'').replace(/<[^>]+>/g,' ')+(sec.steps||[]).map(s=>s.t).join(' ');
      const i=full.toLowerCase().indexOf(ql);
      const s=Math.max(0,i-30),e=Math.min(full.length,i+q.length+60);
      excerpt=full.substring(s,e).replace(/\s+/g,' ').replace(new RegExp(q.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&'),'gi'),'<em>$&</em>');
    }
    if(score>0) hits.push({sec,score,excerpt});
  });
  hits.sort((a,b)=>b.score-a.score);
  if(hits.length===0){
    res.innerHTML=`<div class="no-res">「${q}」に一致する項目が見つかりませんでした</div>`;
  } else {
    res.innerHTML=hits.map(h=>`<div class="sr-item" onclick="goTo(${h.sec.id})"><div class="sr-num">第${h.sec.id}章</div><div><div class="sr-title">${h.sec.icon} ${h.sec.title}</div><div class="sr-exc">${h.excerpt||h.sec.sub}</div></div><span class="tag tag-${h.sec.tag}" style="align-self:center">${h.sec.tagL}</span></div>`).join('');
  }
  filterTOC(q);
}
function filterTOC(q){
  document.querySelectorAll('#tocList .toc-item').forEach(item=>{
    if(!q){item.classList.remove('hidden','hmatch');const t=item.querySelector('.toc-text');if(t)t.innerHTML=t.textContent;return;}
    const kw=item.dataset.kw||'';
    const t=item.querySelector('.toc-text');
    const raw=t?t.textContent:'';
    if(kw.toLowerCase().includes(q.toLowerCase())||raw.toLowerCase().includes(q.toLowerCase())){
      item.classList.remove('hidden');item.classList.add('hmatch');
      if(t) t.innerHTML=raw.replace(new RegExp(q.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&'),'gi'),'<em>$&</em>');
    } else {item.classList.add('hidden');item.classList.remove('hmatch');}
  });
}
function closeSearch(){
  document.getElementById('searchOv').classList.remove('open');
  document.getElementById('headerSearch').value='';
  filterTOC('');
  document.getElementById('kchips').style.display='flex';
}

// ========== イベント ==========
document.getElementById('headerSearch').addEventListener('input',e=>runSearch(e.target.value.trim()));
document.getElementById('sideSearch').addEventListener('input',e=>filterTOC(e.target.value.trim()));
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeSearch();});
document.getElementById('mainArea').addEventListener('click',e=>{
  const ov=document.getElementById('searchOv');
  if(ov.classList.contains('open')&&!ov.contains(e.target)&&e.target.id!=='headerSearch') closeSearch();
});

// ========== 初期化 ==========
buildTOC();
buildPages();
buildSplash();
goTo(S.cur||0);
updateGlobal();

  const sb = document.getElementById('sidebar');
  sb.classList.toggle('sp-open');

    btn.style.display = 'none';
    // PC表示に戻ったらサイドバーを常時表示

window.addEventListener('resize', checkMobile);
checkMobile();

// スマホでTOCアイテムクリック後にメニューを閉じる
const origGoTo = goTo;
goTo = function(id){
  origGoTo(id);
  if(window.innerWidth <= 768){
    const sb = document.getElementById('sidebar');
    sb.classList.remove('sp-open');
    document.getElementById('spMenuBtn').textContent = '☰';
  }
};

</script>
